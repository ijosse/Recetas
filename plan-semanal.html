<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Semanal</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen pb-10 transition-colors duration-300">
    
    <div id="mi-menu-reutilizable"></div>

    <div class="max-w-7xl mx-auto px-4 py-8 mt-20">
        
        <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-4 border-b border-gray-200 dark:border-gray-700 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-slate-800 dark:text-white">Mi Calendario</h1>
                <p class="text-slate-500 dark:text-slate-400 mt-1">Organización oficial del PDF</p>
            </div>
            
            <div class="w-full md:w-64">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Elige el Menú:</label>
                <select id="selector-menu" onchange="cambiarMenu()" class="w-full p-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-slate-800 text-gray-700 dark:text-white shadow-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </select>
            </div>
        </div>

        <div id="caja-objetivo" class="hidden mb-8 bg-gradient-to-br from-blue-50 to-indigo-50 dark:from-slate-800 dark:to-slate-800 border-l-4 border-blue-500 rounded-r-xl p-5 shadow-sm flex flex-col sm:flex-row items-start gap-4 transition-colors">
            <div class="bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 p-3 rounded-full shrink-0 shadow-sm">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            </div>
            <div class="w-full">
                <h3 class="text-sm font-bold text-blue-800 dark:text-blue-300 uppercase tracking-wide mb-2">Objetivos de la Semana</h3>
                <div id="texto-objetivo" class="text-slate-700 dark:text-slate-200"></div>
            </div>
        </div>
        <div id="contenedor-semana" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
        </div>

    </div>

    <script src="navbar.js"></script>
    <script src="recetas.js"></script>
    <script src="menus.js"></script>

    <script>
        const selector = document.getElementById('selector-menu');
        const contenedor = document.getElementById('contenedor-semana');
        const cajaObjetivo = document.getElementById('caja-objetivo');
        const textoObjetivo = document.getElementById('texto-objetivo');

        // 1. FUNCIÓN ENLACES
        function crearEnlaceSiExiste(nombrePlato) {
            if (!nombrePlato) return ""; 
            if (typeof listaRecetas === 'undefined') return nombrePlato;
            const recetaEncontrada = listaRecetas.find(r => 
                r.titulo.toLowerCase().trim() === nombrePlato.toLowerCase().trim()
            );
            if (recetaEncontrada) {
                return `<a href="receta.html?id=${recetaEncontrada.id}" class="text-blue-600 dark:text-blue-400 font-bold hover:underline decoration-2 underline-offset-2 hover:text-blue-800 dark:hover:text-blue-300 transition-colors" title="Ver receta">${nombrePlato}</a>`;
            } else {
                return nombrePlato;
            }
        }

        // 2. FUNCIÓN FORMATO PLATOS
        function formatearPlatos(contenido) {
            if (!contenido) return "<span class='text-gray-400 italic text-xs'>-</span>";
            if (Array.isArray(contenido)) {
                return contenido.map(plato => `
                    <span class="block mb-1 border-l-2 border-transparent hover:border-blue-300 pl-1 transition-colors">
                        ${crearEnlaceSiExiste(plato)}
                    </span>
                `).join('');
            }
            return crearEnlaceSiExiste(contenido);
        }

        // --- INICIALIZACIÓN INTELIGENTE ---
        if (typeof coleccionMenus !== 'undefined' && coleccionMenus.length > 0) {
            
            let indiceInicial = -1;

            // 1. Llenar el selector
            coleccionMenus.forEach((menu, index) => {
                const opcion = document.createElement('option');
                opcion.value = index;
                
                // Si el menú tiene la propiedad activa: true, le ponemos estrella y guardamos el índice
                if (menu.activa === true) {
                    opcion.text = `★ ${menu.nombre}`;
                    indiceInicial = index;
                } else {
                    opcion.text = menu.nombre;
                }
                
                selector.appendChild(opcion);
            });

            // 2. Si no se encontró ningún menú activo, usamos el último por defecto
            if (indiceInicial === -1) {
                indiceInicial = coleccionMenus.length - 1;
            }

            // 3. Renderizar
            selector.value = indiceInicial;
            renderizarSemana(indiceInicial);

        } else {
            contenedor.innerHTML = '<p class="text-red-500 text-center py-10">Error: No se encuentra el archivo menus.js o está vacío</p>';
        }

        function cambiarMenu() {
            renderizarSemana(selector.value);
        }

        // EL PINTOR DE SEMANAS (Actualizado para flexibilidad de comidas)
        function renderizarSemana(index) {
            const menuSeleccionado = coleccionMenus[index];
            contenedor.innerHTML = ""; 

            // --- LÓGICA INTELIGENTE DE OBJETIVOS ---
            const obj = menuSeleccionado.objetivo;
            
            if (obj && obj.length > 0) {
                cajaObjetivo.classList.remove('hidden');
                
                if (Array.isArray(obj)) {
                    let htmlLista = '<ul class="list-disc list-inside space-y-1">';
                    obj.forEach(frase => {
                        htmlLista += `<li class="marker:text-blue-500 dark:marker:text-blue-400">${frase}</li>`;
                    });
                    htmlLista += '</ul>';
                    textoObjetivo.innerHTML = htmlLista;
                } else {
                    textoObjetivo.innerHTML = `<p>${obj}</p>`;
                }
            } else {
                cajaObjetivo.classList.add('hidden');
            }
            // ---------------------------------------

            // Configuración maestra de comidas y sus colores Tailwind
            const configComidas = [
                { id: 'desayuno', titulo: 'Desayuno', clases: 'bg-blue-100 dark:bg-blue-900 dark:text-blue-200 text-blue-600 border-blue-200 dark:border-blue-800' },
                { id: 'segundoDesayuno', titulo: 'Segundo Desayuno', clases: 'bg-orange-100 dark:bg-orange-900 dark:text-orange-200 text-orange-600 border-orange-200 dark:border-orange-800' },
                { id: 'almuerzo', titulo: 'Almuerzo', clases: 'bg-green-100 dark:bg-green-900 dark:text-green-200 text-green-600 border-green-200 dark:border-green-800' },
                { id: 'merienda', titulo: 'Merienda', clases: 'bg-yellow-100 dark:bg-yellow-900 dark:text-yellow-200 text-yellow-600 border-yellow-200 dark:border-yellow-800' },
                { id: 'cena', titulo: 'Cena', clases: 'bg-indigo-100 dark:bg-indigo-900 dark:text-indigo-200 text-indigo-600 border-indigo-200 dark:border-indigo-800' }
            ];

            menuSeleccionado.semana.forEach(dia => {
                let htmlBloquesComida = "";
                let contadorNumeros = 1;

                // Iteramos sobre las posibles comidas. Si existen en este día, las pintamos.
                configComidas.forEach(config => {
                    const platosDeEstaComida = dia.comidas[config.id];
                    
                    if (platosDeEstaComida && platosDeEstaComida.length > 0) {
                        htmlBloquesComida += `
                            <div class="flex gap-3">
                                <div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shrink-0 border ${config.clases}">${contadorNumeros}</div>
                                <div class="w-full">
                                    <p class="text-xs text-gray-400 font-bold uppercase mb-1">${config.titulo}</p>
                                    <div class="text-gray-700 dark:text-gray-300 text-sm leading-relaxed">
                                        ${formatearPlatos(platosDeEstaComida)}
                                    </div>
                                </div>
                            </div>
                        `;
                        contadorNumeros++; // Aumentamos el número del círculo para la siguiente
                    }
                });

                const diaHTML = `
                    <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col hover:shadow-md transition-shadow">
                        <div class="bg-slate-50 dark:bg-slate-900 p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                            <h3 class="font-bold text-lg text-slate-800 dark:text-white capitalize">${dia.dia}</h3>
                        </div>
                        <div class="p-5 space-y-4 flex-1">
                            ${htmlBloquesComida}
                        </div>
                    </div>
                `;
                contenedor.innerHTML += diaHTML;
            });
        }
    </script>
</body>
</html>
